<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Member wallet coupon redemption flow</title>
  <desc id="desc">A member wallet flow from campaign setup, coupon claiming, wallet balance and points, QR redemption, to backend conversion records.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff9ef"/>
      <stop offset=".55" stop-color="#edf6f1"/>
      <stop offset="1" stop-color="#f7ead1"/>
    </linearGradient>
    <filter id="shadow" x="-16%" y="-18%" width="132%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#26372f" flood-opacity=".14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M1 1l10 5-10 5z" fill="#2f7566"/>
    </marker>
    <style>
      .title{font:700 34px "Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;fill:#15251f}
      .sub{font:500 17px "Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;fill:#64716c}
      .eyebrow{font:800 12px "Inter","Noto Sans TC",sans-serif;letter-spacing:.13em;fill:#2f7566}
      .card-title{font:800 21px "Noto Sans TC","PingFang TC",sans-serif;fill:#15251f}
      .copy{font:500 14px "Noto Sans TC","PingFang TC",sans-serif;fill:#64716c}
      .panel{fill:#fffdf7;stroke:#dce6dd;stroke-width:1.3;filter:url(#shadow)}
      .phone{fill:#152839;filter:url(#shadow)}
      .screen{fill:#203f45}
      .green{fill:#2f7566}
      .gold{fill:#d3a445}
      .cream{fill:#fffdf7}
      .navy{fill:#152839}
      .line{stroke:#2f7566;stroke-width:4;stroke-linecap:round;fill:none;marker-end:url(#arrow)}
      .return{stroke:#d3a445;stroke-width:3;stroke-linecap:round;stroke-dasharray:8 10;fill:none}
    </style>
  </defs>
  <rect width="1200" height="675" rx="34" fill="url(#bg)"/>
  <circle cx="1055" cy="122" r="156" fill="#d8eee6" opacity=".68"/>
  <circle cx="132" cy="552" r="174" fill="#f1d6a1" opacity=".42"/>
  <text x="64" y="70" class="title">會員錢包與優惠券核銷流程</text>
  <text x="64" y="104" class="sub">從商家發券、會員領券，到 QR 核銷與轉換紀錄回到後台</text>

  <g transform="translate(78 170)">
    <rect class="panel" width="230" height="142" rx="26"/>
    <circle cx="48" cy="48" r="24" class="gold"/>
    <path d="M36 48h24M48 36v24" stroke="#fffdf7" stroke-width="6" stroke-linecap="round"/>
    <text x="88" y="45" class="eyebrow">MERCHANT</text>
    <text x="88" y="78" class="card-title">活動後台</text>
    <text x="88" y="106" class="copy">發券、庫存、轉換率</text>
  </g>

  <g transform="translate(402 116)">
    <rect class="phone" width="296" height="424" rx="42"/>
    <rect x="20" y="22" width="256" height="380" rx="30" class="screen"/>
    <rect x="89" y="14" width="118" height="22" rx="11" fill="#11161d"/>
    <text x="54" y="76" font-family="Inter,Noto Sans TC,sans-serif" font-size="14" font-weight="800" fill="#fffdf7">MEMBER WALLET</text>
    <rect x="54" y="104" width="188" height="70" rx="18" class="cream"/>
    <text x="78" y="136" class="eyebrow">BALANCE</text>
    <text x="78" y="160" font-family="Inter,Noto Sans TC,sans-serif" font-size="20" font-weight="800" fill="#15251f">Points + Wallet</text>
    <rect x="54" y="196" width="188" height="82" rx="18" fill="#f6e6bd"/>
    <text x="78" y="228" class="eyebrow">COUPON</text>
    <text x="78" y="252" font-family="Noto Sans TC,PingFang TC,sans-serif" font-size="20" font-weight="800" fill="#15251f">一鍵領券</text>
    <rect x="94" y="302" width="108" height="72" rx="10" class="cream"/>
    <g fill="#152839">
      <rect x="106" y="314" width="20" height="20"/><rect x="136" y="314" width="10" height="10"/><rect x="166" y="314" width="20" height="20"/>
      <rect x="106" y="344" width="10" height="10"/><rect x="126" y="338" width="36" height="16"/><rect x="174" y="344" width="12" height="24"/>
      <rect x="106" y="364" width="48" height="8"/><rect x="166" y="370" width="20" height="8"/>
    </g>
  </g>

  <g transform="translate(842 170)">
    <rect class="panel" width="250" height="142" rx="26"/>
    <circle cx="48" cy="48" r="24" class="green"/>
    <path d="M34 48h28M48 34v28" stroke="#fffdf7" stroke-width="6" stroke-linecap="round"/>
    <text x="88" y="45" class="eyebrow">REDEEM</text>
    <text x="88" y="78" class="card-title">QR 核銷</text>
    <text x="88" y="106" class="copy">折抵、扣點、用券紀錄</text>
  </g>

  <g transform="translate(824 420)">
    <rect class="panel" width="286" height="132" rx="26"/>
    <circle cx="48" cy="48" r="24" class="navy"/>
    <path d="M35 62h26M35 50h42M35 38h30" stroke="#fffdf7" stroke-width="6" stroke-linecap="round"/>
    <text x="88" y="46" class="eyebrow">DATA</text>
    <text x="88" y="78" class="card-title">回到會員營運</text>
    <text x="88" y="106" class="copy">分群、回訪、再行銷</text>
  </g>

  <path d="M308 241 C342 241 360 241 402 241" class="line"/>
  <path d="M698 241 C748 241 786 241 842 241" class="line"/>
  <path d="M966 312 C966 350 960 384 948 420" class="line"/>
  <path d="M824 486 C720 596 412 590 248 312" class="return"/>
</svg>
