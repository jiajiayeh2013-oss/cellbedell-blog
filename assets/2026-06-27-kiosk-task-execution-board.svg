<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1040" role="img" aria-labelledby="title desc">
  <title id="title">Kiosk 把旅客操作轉成現場任務流程圖</title>
  <desc id="desc">旅客在 Kiosk 掃描 QR Code、Wallet Pass 或 NFC 後，系統確認訂單並觸發 PMS 更新、發卡、通行憑證、門禁權限、櫃台通知與紀錄留存。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fffaf3"/>
      <stop offset="55%" stop-color="#f2e4d1"/>
      <stop offset="100%" stop-color="#dde8dc"/>
    </linearGradient>
    <linearGradient id="dark" x1="0" x2="1">
      <stop offset="0%" stop-color="#211814"/>
      <stop offset="100%" stop-color="#3a2a20"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#33251e" flood-opacity=".14"/>
    </filter>
  </defs>
  <rect width="1400" height="1040" rx="52" fill="url(#bg)"/>
  <circle cx="1190" cy="150" r="170" fill="#fff7ea" opacity=".62"/>
  <circle cx="184" cy="760" r="155" fill="#d06435" opacity=".12"/>
  <text x="82" y="92" fill="#bd5830" font-family="Arial, sans-serif" font-size="28" letter-spacing="9">TASK EXECUTION BOARD</text>
  <text x="82" y="156" fill="#211814" font-family="Georgia, 'Times New Roman', serif" font-size="62" font-weight="700">Kiosk 不只是螢幕</text>
  <text x="84" y="208" fill="#5f5751" font-family="Arial, sans-serif" font-size="26">它把旅客操作轉成可執行、可追蹤、可交接的入住任務。</text>

  <g transform="translate(82 310)">
    <rect x="0" y="0" width="394" height="452" rx="36" fill="url(#dark)" filter="url(#shadow)"/>
    <text x="42" y="62" fill="#f4c542" font-family="Arial, sans-serif" font-size="21" letter-spacing="7">GUEST ACTION</text>
    <text x="42" y="124" fill="#fffaf3" font-family="Georgia, serif" font-size="44" font-weight="700">旅客到場確認</text>
    <rect x="74" y="174" width="112" height="160" rx="24" fill="#fffaf3"/>
    <rect x="92" y="195" width="76" height="92" rx="13" fill="#dce9e0"/>
    <circle cx="130" cy="306" r="8" fill="#211814"/>
    <rect x="214" y="185" width="92" height="132" rx="20" fill="#71815f"/>
    <path d="M238 236h44M238 264h30" stroke="#fffaf3" stroke-width="11" stroke-linecap="round"/>
    <path d="M70 364h250" stroke="#bd8f66" stroke-width="2"/>
    <text x="42" y="398" fill="#fffaf3" font-family="Georgia, serif" font-size="29" font-weight="700">掃 QR Code / Wallet</text>
    <text x="42" y="434" fill="#fffaf3" font-family="Georgia, serif" font-size="29" font-weight="700">或感應 NFC 卡</text>
  </g>

  <path d="M500 536h92" stroke="#bd8f66" stroke-width="12" stroke-linecap="round"/>
  <path d="M562 508l38 28-38 28" fill="none" stroke="#bd8f66" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(620 304)">
    <rect x="0" y="0" width="694" height="608" rx="38" fill="#fffaf3" opacity=".92" filter="url(#shadow)"/>
    <text x="42" y="62" fill="#bd5830" font-family="Arial, sans-serif" font-size="21" letter-spacing="7">SYSTEM TASKS</text>
    <text x="42" y="116" fill="#211814" font-family="Georgia, serif" font-size="42" font-weight="700">Kiosk 觸發 6 個現場任務</text>

    <g transform="translate(42 160)">
      <rect width="288" height="118" rx="26" fill="#edf4ef"/>
      <circle cx="54" cy="58" r="28" fill="#71815f"/>
      <path d="M42 58h24M54 46v24" stroke="#fffaf3" stroke-width="8" stroke-linecap="round"/>
      <text x="98" y="50" fill="#211814" font-family="Georgia, serif" font-size="28" font-weight="700">更新 PMS</text>
      <text x="98" y="82" fill="#5f5751" font-family="Arial, sans-serif" font-size="20">入住狀態 / 備註</text>
    </g>

    <g transform="translate(364 160)">
      <rect width="288" height="118" rx="26" fill="#f4e2ce"/>
      <circle cx="54" cy="58" r="28" fill="#d06435"/>
      <path d="M40 58h28M54 44v28" stroke="#fffaf3" stroke-width="8" stroke-linecap="round"/>
      <text x="98" y="50" fill="#211814" font-family="Georgia, serif" font-size="28" font-weight="700">觸發發卡</text>
      <text x="98" y="82" fill="#5f5751" font-family="Arial, sans-serif" font-size="20">房號 / 有效時間</text>
    </g>

    <g transform="translate(42 318)">
      <rect width="288" height="118" rx="26" fill="#f7efe4"/>
      <rect x="32" y="30" width="48" height="58" rx="10" fill="#211814"/>
      <path d="M44 58h24M56 46v24" stroke="#f4c542" stroke-width="7" stroke-linecap="round"/>
      <text x="98" y="50" fill="#211814" font-family="Georgia, serif" font-size="28" font-weight="700">產生憑證</text>
      <text x="98" y="82" fill="#5f5751" font-family="Arial, sans-serif" font-size="20">Wallet / QR Code</text>
    </g>

    <g transform="translate(364 318)">
      <rect width="288" height="118" rx="26" fill="#edf4ef"/>
      <rect x="34" y="28" width="44" height="64" rx="12" fill="#71815f"/>
      <path d="M47 58h18" stroke="#fffaf3" stroke-width="8" stroke-linecap="round"/>
      <text x="98" y="50" fill="#211814" font-family="Georgia, serif" font-size="28" font-weight="700">開通門禁</text>
      <text x="98" y="82" fill="#5f5751" font-family="Arial, sans-serif" font-size="20">權限 / 區域 / 時段</text>
    </g>

    <g transform="translate(42 476)">
      <rect width="288" height="118" rx="26" fill="#f4e2ce"/>
      <path d="M36 66c32-48 60-48 92 0" stroke="#d06435" stroke-width="11" fill="none" stroke-linecap="round"/>
      <text x="128" y="50" fill="#211814" font-family="Georgia, serif" font-size="25" font-weight="700">通知櫃台</text>
      <text x="128" y="82" fill="#5f5751" font-family="Arial, sans-serif" font-size="19">例外 / 夜班 / 房務</text>
    </g>

    <g transform="translate(364 476)">
      <rect width="288" height="118" rx="26" fill="#f7efe4"/>
      <path d="M34 40h50M34 62h76M34 84h42" stroke="#71815f" stroke-width="9" stroke-linecap="round"/>
      <text x="122" y="50" fill="#211814" font-family="Georgia, serif" font-size="25" font-weight="700">留下紀錄</text>
      <text x="122" y="82" fill="#5f5751" font-family="Arial, sans-serif" font-size="19">誰 / 何時 / 哪張卡</text>
    </g>
  </g>

  <g transform="translate(166 940)">
    <rect x="0" y="0" width="1068" height="58" rx="29" fill="#211814" opacity=".92"/>
    <text x="42" y="38" fill="#fffaf3" font-family="Georgia, serif" font-size="25" font-weight="700">任務能被追蹤，旅宿才不會在自助化之後失去現場掌控感。</text>
  </g>
</svg>
