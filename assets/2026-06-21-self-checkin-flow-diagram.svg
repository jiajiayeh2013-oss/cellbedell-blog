<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Cellbedell iPad 自助入住與發卡流程示意圖</title>
  <desc id="desc">旅客先用手機完成 pre check-in，抵達後由多台 iPad 分流，系統透過邊緣運算決定發放手機金鑰或由 Cellbedell 自助發卡機發放房卡，最後透過電子鎖自有電路板完成開門。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fbf7ef"/>
      <stop offset="0.55" stop-color="#f0eadf"/>
      <stop offset="1" stop-color="#e5efe8"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0" stop-color="#a95634"/>
      <stop offset="1" stop-color="#5f8b6b"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#6b4c33" flood-opacity="0.16"/>
    </filter>
    <style>
      .title{font:700 34px "Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;fill:#2d2722}
      .sub{font:500 18px "Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;fill:#75685d}
      .step-title{font:700 22px "Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;fill:#2d2722}
      .step-copy{font:500 15px "Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;fill:#695f55}
      .tag{font:700 13px "Inter","Noto Sans TC",sans-serif;letter-spacing:.08em;fill:#fff}
      .small{font:600 13px "Noto Sans TC","PingFang TC",sans-serif;fill:#7a6e62}
      .card{fill:#fffaf2;stroke:#ded2c3;stroke-width:1.5;filter:url(#shadow)}
      .device{fill:#2f2925}
      .device-screen{fill:#f6eee4}
      .line{fill:none;stroke:url(#accent);stroke-width:5;stroke-linecap:round;stroke-linejoin:round}
      .dash{fill:none;stroke:#9b8e7c;stroke-width:2.5;stroke-dasharray:7 8;stroke-linecap:round}
      .chip{fill:#3f6f58}
      .warm{fill:#a95634}
      .soft{fill:#f4e8da}
    </style>
  </defs>

  <rect width="1200" height="675" rx="34" fill="url(#bg)"/>
  <circle cx="1060" cy="110" r="150" fill="#d9eadc" opacity=".45"/>
  <circle cx="120" cy="585" r="190" fill="#eed4bf" opacity=".42"/>

  <text x="70" y="72" class="title">iPad 自助入住：從預辦入住到開門的一條流程</text>
  <text x="70" y="108" class="sub">手機 pre check-in、多台 iPad 分流、自助發卡機、手機金鑰與電子鎖電路板整合</text>

  <path class="line" d="M226 331 C310 255 375 255 458 331 S624 407 706 331 S872 255 954 331"/>
  <path class="dash" d="M706 380 C760 455 832 492 928 492"/>

  <g transform="translate(64 176)">
    <rect class="card" width="218" height="290" rx="24"/>
    <rect x="82" y="42" width="58" height="112" rx="14" class="device"/>
    <rect x="90" y="55" width="42" height="76" rx="7" class="device-screen"/>
    <circle cx="111" cy="140" r="5" fill="#d7cfc4"/>
    <rect x="42" y="178" width="134" height="26" rx="13" class="warm"/>
    <text x="109" y="197" text-anchor="middle" class="tag">PRE CHECK-IN</text>
    <text x="32" y="236" class="step-title">旅客手機</text>
    <text x="32" y="264" class="step-copy">提前填資料、確認訂單</text>
    <text x="32" y="286" class="step-copy">減少現場輸入與等待</text>
  </g>

  <g transform="translate(342 176)">
    <rect class="card" width="218" height="290" rx="24"/>
    <rect x="42" y="42" width="58" height="104" rx="10" class="device"/>
    <rect x="50" y="55" width="42" height="70" rx="6" class="device-screen"/>
    <rect x="116" y="30" width="68" height="126" rx="11" class="device"/>
    <rect x="125" y="43" width="50" height="88" rx="7" class="device-screen"/>
    <rect x="32" y="178" width="154" height="26" rx="13" class="chip"/>
    <text x="109" y="197" text-anchor="middle" class="tag">iPad 分流</text>
    <text x="32" y="236" class="step-title">多點報到</text>
    <text x="32" y="264" class="step-copy">櫃台、入口、VIP 區</text>
    <text x="32" y="286" class="step-copy">多台 iPad 同時分流</text>
  </g>

  <g transform="translate(620 176)">
    <rect class="card" width="218" height="290" rx="24"/>
    <rect x="48" y="38" width="122" height="118" rx="18" fill="#3b332d"/>
    <rect x="66" y="58" width="86" height="24" rx="6" class="device-screen"/>
    <rect x="72" y="106" width="74" height="12" rx="6" fill="#d9d0c4"/>
    <rect x="82" y="134" width="54" height="22" rx="6" fill="#f0d6bd"/>
    <rect x="32" y="178" width="154" height="26" rx="13" class="warm"/>
    <text x="109" y="197" text-anchor="middle" class="tag">EDGE COMPUTE</text>
    <text x="32" y="236" class="step-title">自助發卡機</text>
    <text x="32" y="264" class="step-copy">現場核對權限</text>
    <text x="32" y="286" class="step-copy">直接製卡與發卡</text>
  </g>

  <g transform="translate(898 176)">
    <rect class="card" width="238" height="290" rx="24"/>
    <rect x="44" y="50" width="80" height="128" rx="12" fill="#463c34"/>
    <rect x="59" y="70" width="50" height="72" rx="6" class="device-screen"/>
    <circle cx="84" cy="158" r="7" fill="#d8c3a7"/>
    <rect x="146" y="56" width="46" height="92" rx="10" fill="#3f6f58"/>
    <path d="M158 82h22M158 98h22M158 114h22" stroke="#dbeadf" stroke-width="4" stroke-linecap="round"/>
    <rect x="39" y="190" width="162" height="26" rx="13" class="chip"/>
    <text x="120" y="209" text-anchor="middle" class="tag">LOCK CONTROL</text>
    <text x="32" y="244" class="step-title">電子鎖電路板</text>
    <text x="32" y="272" class="step-copy">接房卡或手機金鑰</text>
    <text x="32" y="294" class="step-copy">完成實際開門動作</text>
  </g>

  <g transform="translate(610 492)">
    <rect x="0" y="0" width="290" height="84" rx="22" fill="#fffaf2" stroke="#ded2c3" stroke-width="1.5"/>
    <circle cx="42" cy="42" r="22" fill="#a95634"/>
    <path d="M34 42h16M44 34l8 8-8 8" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="82" y="34" class="step-title">手機金鑰路徑</text>
    <text x="82" y="60" class="step-copy">支援數位通行時可免製實體房卡</text>
  </g>

  <g transform="translate(70 595)">
    <rect width="1060" height="42" rx="21" fill="#2f2925" opacity=".92"/>
    <text x="30" y="28" font-family="Noto Sans TC, PingFang TC, sans-serif" font-size="17" font-weight="700" fill="#fffaf2">核心差異：大型 kiosk 是單點重設備；Cellbedell 流程可用 iPad 多點分流，搭配自助發卡機或手機金鑰，把報到與通行接成完整閉環。</text>
  </g>
</svg>
