<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Cellbedell iPad 自助入住與發卡流程示意圖</title>
  <desc id="desc">旅客先用手機完成 pre check-in，抵達後由多台 iPad 分流。Cellbedell 透過去中心化邊緣運算管理，讓現場節點決定發放手機金鑰或由自助發卡機發放房卡，最後透過電子鎖自有電路板完成開門。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fbf7ef"/>
      <stop offset="0.58" stop-color="#f1eadf"/>
      <stop offset="1" stop-color="#e6f0e9"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" x2="1">
      <stop offset="0" stop-color="#9f5437"/>
      <stop offset="1" stop-color="#3f7359"/>
    </linearGradient>
    <filter id="shadow" x="-8%" y="-16%" width="116%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#5b4431" flood-opacity=".14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="11" markerHeight="11" orient="auto">
      <path d="M1 1l10 5-10 5z" fill="#6f7d60"/>
    </marker>
    <style>
      .title{font:700 33px "Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;fill:#2d2722}
      .sub{font:500 17px "Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;fill:#74685e}
      .step-title{font:700 21px "Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;fill:#2d2722}
      .step-copy{font:500 15px "Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;fill:#665d54}
      .step-num{font:800 14px "Inter","Noto Sans TC",sans-serif;letter-spacing:.08em;fill:#fff}
      .label{font:700 13px "Inter","Noto Sans TC",sans-serif;letter-spacing:.08em;fill:#fff}
      .note-title{font:700 17px "Noto Sans TC","PingFang TC",sans-serif;fill:#2d2722}
      .note-copy{font:500 14px "Noto Sans TC","PingFang TC",sans-serif;fill:#6e6258}
      .card{fill:#fffaf2;stroke:#ded1c3;stroke-width:1.4;filter:url(#shadow)}
      .panel{fill:#fffaf2;stroke:#d9ccb9;stroke-width:1.4}
      .device{fill:#302a25}
      .screen{fill:#f7efe6}
      .warm{fill:#a75a38}
      .green{fill:#3f7359}
      .muted{fill:#86796d}
      .connector{stroke:#6f7d60;stroke-width:3.2;stroke-linecap:round;marker-end:url(#arrow)}
      .branch{stroke:#a75a38;stroke-width:3;stroke-linecap:round;stroke-dasharray:8 8;marker-end:url(#arrow)}
    </style>
  </defs>

  <rect width="1200" height="675" rx="34" fill="url(#bg)"/>
  <circle cx="1070" cy="126" r="150" fill="#dcebdd" opacity=".52"/>
  <circle cx="112" cy="562" r="168" fill="#eed2bb" opacity=".48"/>

  <text x="64" y="68" class="title">Cellbedell 去中心化邊緣運算管理流程</text>
  <text x="64" y="102" class="sub">把 pre check-in、iPad 分流、現場發卡、手機金鑰與電子鎖控制接成完整閉環</text>

  <rect x="64" y="128" width="1072" height="8" rx="4" fill="url(#bar)" opacity=".95"/>

  <line x1="300" y1="310" x2="342" y2="310" class="connector"/>
  <line x1="558" y1="310" x2="600" y2="310" class="connector"/>
  <line x1="816" y1="310" x2="858" y2="310" class="connector"/>
  <path d="M710 452 C765 516 845 538 930 512" class="branch"/>

  <g transform="translate(64 164)">
    <rect class="card" width="236" height="292" rx="24"/>
    <circle cx="42" cy="42" r="19" class="warm"/>
    <text x="42" y="47" text-anchor="middle" class="step-num">01</text>
    <text x="74" y="48" class="label" fill="#a75a38">PRE CHECK-IN</text>

    <rect x="92" y="70" width="54" height="104" rx="13" class="device"/>
    <rect x="100" y="84" width="38" height="68" rx="6" class="screen"/>
    <circle cx="119" cy="162" r="4.5" fill="#d9cfc3"/>
    <path d="M111 106h16M108 122h22M112 138h14" stroke="#a75a38" stroke-width="4" stroke-linecap="round"/>

    <text x="30" y="218" class="step-title">旅客手機</text>
    <text x="30" y="248" class="step-copy">抵達前完成資料填寫</text>
    <text x="30" y="272" class="step-copy">訂單確認與必要流程</text>
  </g>

  <g transform="translate(322 164)">
    <rect class="card" width="236" height="292" rx="24"/>
    <circle cx="42" cy="42" r="19" class="green"/>
    <text x="42" y="47" text-anchor="middle" class="step-num">02</text>
    <text x="74" y="48" class="label" fill="#3f7359">iPad 分流</text>

    <rect x="58" y="82" width="58" height="104" rx="10" class="device"/>
    <rect x="66" y="96" width="42" height="66" rx="6" class="screen"/>
    <rect x="132" y="62" width="70" height="130" rx="12" class="device"/>
    <rect x="142" y="78" width="50" height="88" rx="7" class="screen"/>
    <path d="M75 124h24M151 108h32M151 128h24" stroke="#3f7359" stroke-width="4" stroke-linecap="round"/>

    <text x="30" y="218" class="step-title">多點報到</text>
    <text x="30" y="248" class="step-copy">櫃台、入口、VIP 區</text>
    <text x="30" y="272" class="step-copy">多台 iPad 同時處理</text>
  </g>

  <g transform="translate(580 164)">
    <rect class="card" width="236" height="292" rx="24"/>
    <circle cx="42" cy="42" r="19" class="warm"/>
    <text x="42" y="47" text-anchor="middle" class="step-num">03</text>
    <text x="74" y="48" class="label" fill="#a75a38">EDGE NODE</text>

    <rect x="58" y="72" width="120" height="108" rx="18" fill="#3b332d"/>
    <rect x="76" y="92" width="84" height="22" rx="6" class="screen"/>
    <rect x="78" y="136" width="80" height="12" rx="6" fill="#d9d0c4"/>
    <rect x="90" y="160" width="56" height="22" rx="6" fill="#f1d4b9"/>
    <circle cx="186" cy="94" r="10" class="green"/>

    <text x="30" y="218" class="step-title">自助發卡機</text>
    <text x="30" y="248" class="step-copy">現場邊緣運算核對</text>
    <text x="30" y="272" class="step-copy">製卡、發卡或啟用金鑰</text>
  </g>

  <g transform="translate(838 164)">
    <rect class="card" width="298" height="292" rx="24"/>
    <circle cx="42" cy="42" r="19" class="green"/>
    <text x="42" y="47" text-anchor="middle" class="step-num">04</text>
    <text x="74" y="48" class="label" fill="#3f7359">LOCK CONTROL</text>

    <rect x="56" y="74" width="76" height="118" rx="12" fill="#463c34"/>
    <rect x="70" y="92" width="48" height="64" rx="6" class="screen"/>
    <circle cx="94" cy="170" r="7" fill="#d9c2a4"/>
    <rect x="172" y="82" width="56" height="100" rx="12" class="green"/>
    <path d="M186 110h28M186 130h28M186 150h21" stroke="#dbeadf" stroke-width="4" stroke-linecap="round"/>

    <text x="30" y="218" class="step-title">電子鎖電路板</text>
    <text x="30" y="248" class="step-copy">接房卡或手機金鑰權限</text>
    <text x="30" y="272" class="step-copy">把入住狀態轉成開門動作</text>
  </g>

  <g transform="translate(610 482)">
    <rect class="panel" width="308" height="92" rx="22"/>
    <circle cx="44" cy="46" r="24" class="warm"/>
    <path d="M35 46h20M49 38l9 8-9 8" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="84" y="38" class="note-title">手機金鑰路徑</text>
    <text x="84" y="64" class="note-copy">支援數位通行時可免製實體房卡</text>
  </g>

  <g transform="translate(64 594)">
    <rect width="1072" height="50" rx="25" fill="#302a25" opacity=".94"/>
    <text x="30" y="23" font-family="Noto Sans TC, PingFang TC, sans-serif" font-size="15.5" font-weight="700" fill="#fffaf2">核心差異：大型 kiosk 是集中式單點設備；Cellbedell 是去中心化邊緣運算管理。</text>
    <text x="30" y="41" font-family="Noto Sans TC, PingFang TC, sans-serif" font-size="15.5" font-weight="700" fill="#fffaf2">各節點可處理發卡、手機金鑰與電子鎖控制，降低單點故障並提升擴充彈性。</text>
  </g>
</svg>
