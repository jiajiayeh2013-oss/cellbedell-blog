<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Wallet electronic ticket as lightweight credential</title>
  <desc id="desc">A phone wallet pass showing QR code, NFC signal, membership, ticket, coupon and access permission as lightweight credentials.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fbf7ef"/>
      <stop offset=".55" stop-color="#eef6f1"/>
      <stop offset="1" stop-color="#f7ead1"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#112235"/>
      <stop offset="1" stop-color="#244d50"/>
    </linearGradient>
    <filter id="shadow" x="-16%" y="-18%" width="132%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#152839" flood-opacity=".16"/>
    </filter>
    <style>
      .title{font:700 34px "Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;fill:#15251f}
      .sub{font:500 17px "Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;fill:#64716c}
      .label{font:800 12px "Inter","Noto Sans TC",sans-serif;letter-spacing:.13em;fill:#2f7566}
      .card-title{font:800 22px "Noto Sans TC","PingFang TC",sans-serif;fill:#15251f}
      .copy{font:500 15px "Noto Sans TC","PingFang TC",sans-serif;fill:#62706a}
      .phone-copy{font:700 14px "Inter","Noto Sans TC",sans-serif;fill:#fff8ec}
      .panel{fill:#fffdf7;stroke:#dce6dd;stroke-width:1.4;filter:url(#shadow)}
      .chip{fill:#fffdf7;stroke:#dce6dd;stroke-width:1.3;filter:url(#shadow)}
      .green{fill:#2f7566}
      .gold{fill:#d3a445}
      .navy{fill:#152839}
      .muted{fill:#7eb9a8}
      .line{stroke:#2f7566;stroke-width:3.4;stroke-linecap:round;stroke-dasharray:8 10;fill:none}
    </style>
  </defs>

  <rect width="1200" height="675" rx="34" fill="url(#bg)"/>
  <circle cx="1038" cy="130" r="150" fill="#d8eee6" opacity=".7"/>
  <circle cx="124" cy="560" r="172" fill="#f2d9a7" opacity=".46"/>

  <text x="64" y="72" class="title">Wallet 電子票券，是手機裡的輕量憑證</text>
  <text x="64" y="106" class="sub">同一個手機入口，可以承載票券、會員、優惠與通行權限</text>

  <g transform="translate(438 132)">
    <rect x="0" y="0" width="324" height="486" rx="46" fill="#11161d" filter="url(#shadow)"/>
    <rect x="20" y="22" width="284" height="442" rx="34" fill="url(#screen)"/>
    <rect x="98" y="16" width="128" height="24" rx="12" fill="#11161d"/>
    <text x="54" y="88" class="phone-copy">WALLET PASS</text>
    <rect x="54" y="116" width="216" height="260" rx="28" fill="#fffaf0"/>
    <rect x="54" y="116" width="216" height="74" rx="28" fill="#2f7566"/>
    <text x="82" y="164" class="phone-copy">ACCESS READY</text>
    <rect x="96" y="224" width="132" height="132" rx="14" fill="#ffffff"/>
    <g fill="#152839">
      <rect x="108" y="236" width="22" height="22"/><rect x="138" y="236" width="12" height="12"/><rect x="166" y="236" width="22" height="22"/>
      <rect x="196" y="236" width="20" height="20"/><rect x="108" y="268" width="12" height="12"/><rect x="130" y="266" width="32" height="14"/>
      <rect x="176" y="268" width="12" height="12"/><rect x="202" y="268" width="14" height="32"/><rect x="108" y="300" width="22" height="22"/>
      <rect x="142" y="294" width="16" height="40"/><rect x="168" y="304" width="20" height="20"/><rect x="198" y="316" width="18" height="18"/>
      <rect x="108" y="336" width="50" height="8"/><rect x="176" y="342" width="40" height="8"/>
    </g>
    <path d="M128 404c20-22 48-22 68 0M112 424c32-34 68-34 100 0" stroke="#fff8ec" stroke-width="8" stroke-linecap="round" fill="none"/>
    <circle cx="162" cy="420" r="30" fill="#2f7566"/>
    <path d="M148 421l10 10 22-30" stroke="#fff8ec" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <path d="M418 246C360 246 332 226 284 202" class="line"/>
  <path d="M782 246C844 246 872 226 920 202" class="line"/>
  <path d="M418 430C350 438 318 458 266 498" class="line"/>
  <path d="M782 430C852 438 888 460 944 504" class="line"/>

  <g transform="translate(92 148)">
    <rect class="chip" width="236" height="118" rx="24"/>
    <circle cx="46" cy="42" r="20" class="gold"/>
    <path d="M36 42h20M46 32v20" stroke="#fffdf7" stroke-width="5" stroke-linecap="round"/>
    <text x="84" y="44" class="label">COUPON</text>
    <text x="84" y="76" class="card-title">電子優惠券</text>
  </g>

  <g transform="translate(874 148)">
    <rect class="chip" width="236" height="118" rx="24"/>
    <circle cx="46" cy="42" r="20" class="green"/>
    <path d="M34 48c8-20 32-20 40 0" stroke="#fffdf7" stroke-width="5" stroke-linecap="round" fill="none"/>
    <circle cx="54" cy="35" r="9" fill="#fffdf7"/>
    <text x="84" y="44" class="label">MEMBER</text>
    <text x="84" y="76" class="card-title">會員身份</text>
  </g>

  <g transform="translate(92 440)">
    <rect class="chip" width="260" height="118" rx="24"/>
    <circle cx="46" cy="42" r="20" class="navy"/>
    <path d="M32 37h28l10 10h-38zM36 52h30" stroke="#fffdf7" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="84" y="44" class="label">TICKET</text>
    <text x="84" y="76" class="card-title">電子門票 / 報到</text>
  </g>

  <g transform="translate(872 440)">
    <rect class="chip" width="260" height="118" rx="24"/>
    <circle cx="46" cy="42" r="20" class="green"/>
    <path d="M34 45v22h24V45c0-18-24-18-24 0z" stroke="#fffdf7" stroke-width="5" stroke-linejoin="round" fill="none"/>
    <text x="84" y="44" class="label">ACCESS</text>
    <text x="84" y="76" class="card-title">門禁 / 分區權限</text>
  </g>
</svg>
