<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">One wallet pass carries multiple tasks</title>
  <desc id="desc">A single wallet credential branches into coupon, membership, ticket check-in, and access card tasks with records returning to the backend.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff9ee"/>
      <stop offset=".58" stop-color="#edf6f1"/>
      <stop offset="1" stop-color="#f5ead8"/>
    </linearGradient>
    <filter id="shadow" x="-16%" y="-18%" width="132%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#26372f" flood-opacity=".14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M1 1l10 5-10 5z" fill="#2f7566"/>
    </marker>
    <style>
      .title{font:700 34px "Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;fill:#15251f}
      .sub{font:500 17px "Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;fill:#64716c}
      .eyebrow{font:800 12px "Inter","Noto Sans TC",sans-serif;letter-spacing:.13em;fill:#2f7566}
      .node-title{font:800 20px "Noto Sans TC","PingFang TC",sans-serif;fill:#15251f}
      .copy{font:500 14px "Noto Sans TC","PingFang TC",sans-serif;fill:#64716c}
      .card{fill:#fffdf7;stroke:#dce6dd;stroke-width:1.4;filter:url(#shadow)}
      .hub{fill:#152839;filter:url(#shadow)}
      .line{stroke:#2f7566;stroke-width:4;stroke-linecap:round;fill:none;marker-end:url(#arrow)}
      .return{stroke:#d3a445;stroke-width:3;stroke-linecap:round;stroke-dasharray:8 10;fill:none}
      .green{fill:#2f7566}
      .gold{fill:#d3a445}
      .navy{fill:#152839}
      .mint{fill:#e3f4ed}
      .cream{fill:#fffdf7}
    </style>
  </defs>

  <rect width="1200" height="675" rx="34" fill="url(#bg)"/>
  <circle cx="1050" cy="118" r="156" fill="#d8eee6" opacity=".7"/>
  <circle cx="132" cy="552" r="174" fill="#f1d6a1" opacity=".42"/>

  <text x="64" y="70" class="title">從優惠券到門禁卡：同一張 Wallet 可以承載不同任務</text>
  <text x="64" y="104" class="sub">核心不是票券版型，而是同一個身份憑證被不同場景驗證、使用與紀錄</text>

  <g transform="translate(452 184)">
    <rect class="hub" width="296" height="306" rx="38"/>
    <text x="54" y="58" class="eyebrow" fill="#d3a445">WALLET CREDENTIAL</text>
    <rect x="54" y="86" width="188" height="134" rx="22" fill="#fffdf7"/>
    <rect x="54" y="86" width="188" height="44" rx="22" class="green"/>
    <text x="80" y="116" font-family="Inter,Noto Sans TC,sans-serif" font-size="17" font-weight="800" fill="#fffdf7">PASS</text>
    <rect x="88" y="154" width="84" height="46" rx="8" fill="#152839"/>
    <path d="M198 155c14 16 14 34 0 50M218 144c24 28 24 52 0 80" stroke="#2f7566" stroke-width="6" stroke-linecap="round" fill="none"/>
    <circle cx="148" cy="252" r="28" class="gold"/>
    <path d="M135 253l9 9 20-28" stroke="#fffdf7" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <path d="M452 250 C374 228 330 206 274 166" class="line"/>
  <path d="M748 250 C826 228 870 206 926 166" class="line"/>
  <path d="M452 420 C374 442 326 468 268 520" class="line"/>
  <path d="M748 420 C826 442 874 468 932 520" class="line"/>

  <g transform="translate(72 126)">
    <rect class="card" width="286" height="132" rx="26"/>
    <circle cx="50" cy="48" r="24" class="gold"/>
    <path d="M38 48h24M50 36v24" stroke="#fffdf7" stroke-width="6" stroke-linecap="round"/>
    <text x="94" y="46" class="eyebrow">COUPON</text>
    <text x="94" y="78" class="node-title">優惠券</text>
    <text x="94" y="106" class="copy">折扣、活動與核銷</text>
  </g>

  <g transform="translate(842 126)">
    <rect class="card" width="286" height="132" rx="26"/>
    <circle cx="50" cy="48" r="24" class="green"/>
    <circle cx="50" cy="39" r="10" class="cream"/>
    <path d="M34 64c8-18 24-24 32 0" stroke="#fffdf7" stroke-width="6" stroke-linecap="round" fill="none"/>
    <text x="94" y="46" class="eyebrow">MEMBER</text>
    <text x="94" y="78" class="node-title">會員卡</text>
    <text x="94" y="106" class="copy">點數、餘額與等級</text>
  </g>

  <g transform="translate(72 462)">
    <rect class="card" width="286" height="132" rx="26"/>
    <circle cx="50" cy="48" r="24" class="navy"/>
    <path d="M34 42h30l10 12H34zM39 62h30" stroke="#fffdf7" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="94" y="46" class="eyebrow">TICKET</text>
    <text x="94" y="78" class="node-title">電子門票</text>
    <text x="94" y="106" class="copy">報到、入場與紀錄</text>
  </g>

  <g transform="translate(842 462)">
    <rect class="card" width="286" height="132" rx="26"/>
    <circle cx="50" cy="48" r="24" class="green"/>
    <path d="M35 50v26h30V50c0-20-30-20-30 0z" stroke="#fffdf7" stroke-width="6" stroke-linejoin="round" fill="none"/>
    <text x="94" y="46" class="eyebrow">ACCESS</text>
    <text x="94" y="78" class="node-title">門禁卡</text>
    <text x="94" y="106" class="copy">空間、時段與分區</text>
  </g>

  <path d="M244 258 C314 318 404 548 566 548 C728 548 824 318 956 258" class="return"/>
  <text x="470" y="576" class="copy">使用紀錄回到後台：領券、驗票、核銷、通行與會員互動</text>
</svg>
