<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Stadium smart access zones</title>
  <desc id="desc">A smart stadium access map showing fan gate, VIP zone, staff entry, mobile wallet pass, NFC BLE verification, and edge verification.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset=".55" stop-color="#e8f3ee"/>
      <stop offset="1" stop-color="#f5ebd8"/>
    </linearGradient>
    <filter id="shadow" x="-16%" y="-18%" width="132%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#163047" flood-opacity=".15"/>
    </filter>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M1 1l10 5-10 5z" fill="#2f7566"/>
    </marker>
    <style>
      .title{font:700 34px "Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;fill:#14253a}
      .sub{font:500 17px "Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;fill:#607084}
      .label{font:800 12px "Inter","Noto Sans TC",sans-serif;letter-spacing:.13em;fill:#2f7566}
      .copy{font:500 14px "Noto Sans TC","PingFang TC",sans-serif;fill:#607084}
      .node-title{font:800 20px "Noto Sans TC","PingFang TC",sans-serif;fill:#14253a}
      .card{fill:#ffffff;stroke:#d9e4de;stroke-width:1.3;filter:url(#shadow)}
      .stadium{fill:#dfeee8;stroke:#2f7566;stroke-width:8}
      .track{fill:none;stroke:#ffffff;stroke-width:22;opacity:.9}
      .field{fill:#2f7566;opacity:.88}
      .green{fill:#2f7566}
      .gold{fill:#d3a445}
      .navy{fill:#14253a}
      .line{stroke:#2f7566;stroke-width:4;stroke-linecap:round;fill:none;marker-end:url(#arrow)}
      .dash{stroke:#d3a445;stroke-width:3;stroke-linecap:round;stroke-dasharray:8 10;fill:none}
    </style>
  </defs>
  <rect width="1200" height="675" rx="34" fill="url(#bg)"/>
  <circle cx="1068" cy="128" r="150" fill="#cfe9e0" opacity=".72"/>
  <circle cx="126" cy="560" r="168" fill="#f0d8a8" opacity=".45"/>
  <text x="64" y="70" class="title">球場與大型場館智慧通行</text>
  <text x="64" y="104" class="sub">高人流入口需要把電子票券、分區權限與邊緣驗證接成同一條流程</text>

  <g transform="translate(392 152)">
    <ellipse cx="208" cy="190" rx="248" ry="154" class="stadium"/>
    <ellipse cx="208" cy="190" rx="190" ry="112" class="track"/>
    <rect x="114" y="146" width="188" height="88" rx="16" class="field"/>
    <path d="M114 190h188M208 146v88" stroke="#fff" stroke-width="5" opacity=".8"/>
    <circle cx="208" cy="190" r="30" class="gold"/>
    <path d="M194 190l10 10 24-34" stroke="#fff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <g transform="translate(78 176)">
    <rect class="card" width="248" height="118" rx="24"/>
    <circle cx="44" cy="42" r="20" class="green"/>
    <text x="78" y="40" class="label">FAN GATE</text>
    <text x="78" y="72" class="node-title">球迷通道</text>
    <text x="78" y="98" class="copy">Wallet QR / NFC 入場</text>
  </g>

  <g transform="translate(872 176)">
    <rect class="card" width="248" height="118" rx="24"/>
    <circle cx="44" cy="42" r="20" class="gold"/>
    <text x="78" y="40" class="label">VIP ZONE</text>
    <text x="78" y="72" class="node-title">包廂與專區</text>
    <text x="78" y="98" class="copy">票種、身份與分區</text>
  </g>

  <g transform="translate(78 422)">
    <rect class="card" width="248" height="118" rx="24"/>
    <circle cx="44" cy="42" r="20" class="navy"/>
    <text x="78" y="40" class="label">STAFF</text>
    <text x="78" y="72" class="node-title">工作人員入口</text>
    <text x="78" y="98" class="copy">臨時權限與撤銷</text>
  </g>

  <g transform="translate(872 422)">
    <rect class="card" width="248" height="118" rx="24"/>
    <circle cx="44" cy="42" r="20" class="green"/>
    <text x="78" y="40" class="label">EDGE</text>
    <text x="78" y="72" class="node-title">邊緣驗證</text>
    <text x="78" y="98" class="copy">高峰與離線備援</text>
  </g>

  <path d="M326 235 C376 235 390 240 438 256" class="line"/>
  <path d="M872 235 C824 235 810 240 762 256" class="line"/>
  <path d="M326 481 C384 456 404 438 458 394" class="line"/>
  <path d="M872 481 C818 456 798 438 742 394" class="line"/>
  <path d="M600 496 C600 552 600 564 600 590" class="dash"/>
  <text x="432" y="618" class="copy">入場紀錄、區域使用與異常事件回到場館後台</text>
</svg>
